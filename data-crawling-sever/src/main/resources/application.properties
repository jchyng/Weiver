# Server Configuration
server.port=8081
server.servlet.context-path=/

# Database Configuration (Oracle Local Docker)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=system
spring.datasource.password=oracle

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect

# AWS S3 Settings (Dummy values for startup)
cloud.aws.credentials.accessKey=dummy_access_key
cloud.aws.credentials.secretKey=dummy_secret_key
cloud.aws.s3.bucket=dummy-bucket
cloud.aws.region.static=ap-northeast-2
cloud.aws.stack.auto=false

# File Upload Settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# View Resolver (JSP)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.hiddenmethod.filter.enabled=true

# Session & Logging
spring.session.timeout=30m
logging.level.root=info
logging.level.weiver=debug

# Kakao Login API (Dummy values for startup)
kakao.restapikey=dummy_rest_api_key
kakao.redirecturl=http://localhost:8081/kakao
kakao.adminkey=dummy_admin_key
