# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration (Oracle Local Docker)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=system
spring.datasource.password=oracle

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect

# File Upload Settings (Local Path)
upload.path=${user.dir}/weiver-main-server/src/main/resources/static/upload/

# File Upload Settings (Servlet)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# View Resolver (JSP)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.hiddenmethod.filter.enabled=true

# Session & Logging
spring.session.timeout=30m
logging.level.root=info
logging.level.weiver=debug

# Crawling Settings
crawling.startup.enabled=false
crawling.schedule.enabled=false

